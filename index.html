        <style>
        @import url('https://googleapis.com');
        
        :root { 
            --gold: #d4af37; 
            --violeta: #8a2be2; 
            --naranja: #ff8c00; 
            --amarillo: #ffd700; 
            --azul: #1e90ff; 
        }
        
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #111 url('fondo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .escena { position: relative; width: 100%; max-width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* PERSONAJE */
        .personaje { position: absolute; bottom: 0; left: -60px; width: 450px; z-index: 100; pointer-events: none; filter: drop-shadow(15px 10px 25px rgba(0,0,0,0.9)); }
        
        /* LOGO */
        .logo-leon { position: absolute; bottom: 150px; right: 20px; width: 110px; height: 180px; z-index: 180; border: 4px solid var(--gold); border-radius: 50%; background: black; object-fit: contain; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }

        /* RULETA MEJORADA (PASO 1) */
        .ruleta-externa { 
            position: relative; 
            width: min(92vw, 550px); 
            height: min(92vw, 550px); 
            background: conic-gradient(from 0deg, #f9f295, #d4af37, #b38b2d, #f9f295);
            border-radius: 50%; 
            padding: 15px; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4), 0 30px 70px rgba(0,0,0,0.9); 
            z-index: 10; 
            margin-top: -180px; 
            border: 4px solid #5c4b13;
        }

        #wheel { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; }
        
        /* PUNTERO MEJORADO */
        .puntero { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 60px; z-index: 1000; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }

        /* BOTÓN 3D (PASO 3) */
        .btn-giro { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 95px; height: 95px; 
            background: radial-gradient(circle, #333 0%, #000 100%); 
            border: 4px solid var(--gold); border-radius: 50%; 
            color: white; font-size: 16px; font-weight: 900; cursor: pointer; z-index: 9999 !important; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6), inset 0 0 15px rgba(212, 175, 55, 0.4);
            text-shadow: 0 0 8px gold; transition: all 0.3s ease;
        }
        .btn-giro:hover { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 0 40px gold; color: gold; }
        .btn-giro:active { transform: translate(-50%, -50%) scale(0.95); }
        .btn-giro:disabled { opacity: 0.7; filter: grayscale(1); }

        .texto-premio { fill: white; font-size: 5.2px; font-weight: 900; text-anchor: middle; paint-order: stroke; stroke: #000; stroke-width: 1.2px; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5)); }

        /* TICKET */
        .ticket { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; background: white; color: #111; padding: 25px; border-radius: 20px; text-align: center; border: 8px solid var(--gold); box-shadow: 0 0 0 2000px rgba(0,0,0,0.8), 0 30px 100px rgba(0,0,0,1); display: none; z-index: 99999; }
        .ticket h3 { margin: 0; color: #d4af37; font-size: 22px; }
        .ticket h2 { margin: 10px 0; font-size: 55px; }

        @media (max-width: 480px) {
            .personaje { width: 320px; left: -40px; }
            .ruleta-externa { margin-top: -240px; }
            .logo-leon { bottom: 110px; width: 100px; height: 100px; }
        }
    </style>

</head>
<body>

  <circle cx="50" cy="50" r="50" fill="url(#gradSombra)" pointer-events="none" />
                    
<!-- TEXTOS POSICIONADOS RADIALMENTE -->

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script>
        // TUS CREDENCIALES MANTENIDAS - NO EDITAR
        const firebaseConfig = {
            apiKey: "AIzaSyBlaMettjLKQsDAJR2yXBVPUgySE45vMJU",
            authDomain: "ruleta-rey-v2.firebaseapp.com",
            projectId: "ruleta-rey-v2",
            storageBucket: "ruleta-rey-v2.firebasestorage.app",
            messagingSenderId: "470808925766",
            appId: "1:925607172632:web:7f4b59dc96637c3aed416d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const prizes = ["10%", "$1000", "15%", "$500", "20%", "$2000", "10%", "$500"];
        let currentRotation = 0;

        const VERSION = "VERSION_WHATSAPP_V4"; 
        if (localStorage.getItem(VERSION)) {
            document.getElementById('btnFinal').disabled = true;
            document.getElementById('btnFinal').innerText = "USADO";
        }

        function girarRuleta() {
            if (localStorage.getItem(VERSION)) return;
            document.getElementById('btnFinal').disabled = true;

                // Lista de "tickets" en la bolsa. El 4 (20%) solo aparece una vez.
    const bolsa = [0,0,1,1,2,2,3,3,4,5,6,6,7,7]; 
    const randomIndex = Math.floor(Math.random() * bolsa.length);
    const winnerIndex = bolsa[randomIndex];
            const winnerValue = prizes[winnerIndex];
            currentRotation += (10 * 360) - (winnerIndex * 45) - 22.5;
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
            localStorage.setItem(VERSION, 'true');

            setTimeout(async () => {
                let finalID = 0;
                try {
                    const counterRef = db.collection('config').doc('counter');
                    finalID = await db.runTransaction(async (t) => {
                        const d = await t.get(counterRef);
                        const nv = (d.exists ? d.data().value : 0) + 1;
                        t.set(counterRef, { value: nv });
                        return nv;
                    });
                    await db.collection("jugadores").add({ premio: winnerValue, idCupon: finalID, fecha: new Date().toISOString() });
                } catch(e) { finalID = Math.floor(Math.random() * 500); }

                document.getElementById('p-valor').innerText = winnerValue;
                document.getElementById('p-id').innerText = finalID.toString().padStart(4, '0');
                document.getElementById('p-fecha').innerText = new Date().toLocaleString();
                document.getElementById('ticket').style.display = "block";
            }, 3000);
        }
function generarImagenCupon() {
    return html2canvas(document.getElementById("ticket")).then(canvas => {
        return canvas.toDataURL("image/png");
    });
}
function enviarWhatsApp() {
    var numero = "5491124050658"; 
    
    var valorPremio = document.getElementById('p-valor').innerText;
    var idCupon = document.getElementById('p-id').innerText;

    generarImagenCupon().then(imgData => {

        // 📥 Descargar imagen automáticamente
        var link = document.createElement('a');
        link.download = "cupon_" + idCupon + ".png";
        link.href = imgData;
        link.click();

        // 📲 Mensaje WhatsApp
        var texto = "🎰 CASINO REY VIP 🎰\n\n" +
                    "Te envío mi cupón ganador 🏆\n" +
                    "🎫 Código: #" + idCupon + "\n\n" +
                    "Adjunto la imagen.";

        var urlFinal = "https://wa.me/" + numero + "?text=" + encodeURIComponent(texto);

        window.open(urlFinal, '_blank');
    });
}

    </script>
