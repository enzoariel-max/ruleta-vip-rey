<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Rey VIP - Luxury Sorteo</title>
    <!-- Firebase SDK v8 (Versión más estable para este diseño) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        @import url('https://googleapis.com');
        :root { --gold: #d4af37; --violeta: #8a2be2; --naranja: #ff8c00; --amarillo: #ffd700; --azul: #1e90ff; }
        
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #111 url('fondo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        .escena { position: relative; width: 100%; max-width: 900px; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .personaje { position: absolute; bottom: 0; left: -50px; width: 400px; z-index: 100; pointer-events: none; filter: drop-shadow(20px 10px 30px rgba(0,0,0,0.9)); }
        
        /* LOGO CIRCULAR */
        .logo-leon { position: absolute; bottom: 30px; right: 40px; width: 100px; height: 100px; aspect-ratio: 1 / 1; z-index: 101; border: 3px solid var(--gold); border-radius: 50%; background: black; object-fit: contain; box-shadow: 0 0 20px rgba(212,175,55,0.6); }

        /* RULETA GRANDE */
        .ruleta-externa { position: relative; width: 550px; height: 550px; background: radial-gradient(circle, #f9f295 0%, #d4af37 50%, #b38b2d 100%); border-radius: 50%; padding: 12px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); z-index: 10; margin-top: -50px; }
        
        #wheel { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); border-radius: 50%; }
        
        .puntero { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 65px; z-index: 1000; pointer-events: none; }
        
        .btn-giro { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110px; height: 110px; background: #000; border: 5px solid var(--gold); border-radius: 50%; color: gold; font-size: 18px; font-weight: 900; cursor: pointer; z-index: 2000 !important; box-shadow: 0 0 30px gold; }
        .btn-giro:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        /* TEXTO BLANCO CON BORDE NEGRO */
        .texto-premio { fill: white; font-size: 5.2px; font-weight: 900; text-anchor: middle; paint-order: stroke; stroke: #000; stroke-width: 1px; }

        /* TICKET ELEGANTE */
        .ticket { position: absolute; bottom: 40px; width: 350px; background: rgba(255, 255, 255, 0.98); color: #111; padding: 25px; border-radius: 20px; text-align: center; border: 4px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.9); display: none; z-index: 3000; }
        .ticket h2 { margin: 0; font-size: 50px; color: var(--naranja); }
        .ticket p { margin: 10px 0; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="escena">
        <img src="chico.png" class="personaje">
        <img src="leon.png" class="logo-leon">
        
        <div class="ruleta-externa">
            <svg class="puntero" viewBox="0 0 100 100"><path d="M50 100 L100 0 L0 0 Z" fill="#fff" /></svg>
            <div id="wheel">
                <svg viewBox="0 0 100 100">
                    <!-- Porciones -->
                    <path d="M50 50 L100 50 A50 50 0 0 1 85.3 85.3 Z" fill="var(--violeta)" />
                    <path d="M50 50 L85.3 85.3 A50 50 0 0 1 50 100 Z" fill="var(--naranja)" />
                    <path d="M50 50 L50 100 A50 50 0 0 1 14.7 85.3 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L14.7 85.3 A50 50 0 0 1 0 50 Z" fill="var(--azul)" />
                    <path d="M50 50 L0 50 A50 50 0 0 1 14.7 14.7 Z" fill="var(--violeta)" />
                    <path d="M50 50 L14.7 14.7 A50 50 0 0 1 50 0 Z" fill="var(--naranja)" />
                    <path d="M50 50 L50 0 A50 50 0 0 1 85.3 14.7 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L85.3 14.7 A50 50 0 0 1 100 50 Z" fill="var(--azul)" />
                    
                    <!-- Premios Centrados y con Borde Negro -->
                    <text x="77" y="68" class="texto-premio" transform="rotate(22.5, 77, 68)">500</text>
                    <text x="58" y="81" class="texto-premio" transform="rotate(67.5, 58, 81)">10%</text>
                    <text x="31" y="81" class="texto-premio" transform="rotate(112.5, 31, 81)">$1000</text>
                    <text x="14" y="68" class="texto-premio" transform="rotate(157.5, 14, 68)">15%</text>
                    <text x="23" y="32" class="texto-premio" transform="rotate(202.5, 23, 32)">500</text>
                    <text x="42" y="19" class="texto-premio" transform="rotate(247.5, 42, 19)">10%</text>
                    <text x="69" y="19" class="texto-premio" transform="rotate(292.5, 69, 19)">$2000</text>
                    <text x="86" y="32" class="texto-premio" transform="rotate(337.5, 86, 32)">20%</text>
                </svg>
            </div>
            <button class="btn-giro" id="btnFinal">GIRAR</button>
        </div>

        <div id="ticket" class="ticket">
            <h2 id="p-valor">---</h2>
            <p>ID DE CUPÓN: #<span id="p-id">0000</span></p>
            <small id="p-fecha"></small>
        </div>
    </div>

    <script>
        // CREDENCIALES ACTUALIZADAS: ruleta-rey-v2
        const firebaseConfig = {
            apiKey: "AIzaSyB3CWqVqfX3fW7EOk_uqwZCkbowHZSdRFs",
            authDomain: "://firebaseapp.com",
            projectId: "ruleta-rey-v2",
            storageBucket: "ruleta-rey-v2.firebasestorage.app",
            messagingSenderId: "925607172632",
            appId: "1:925607172632:web:7f4b59dc96637c3aed416d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const btn = document.getElementById('btnFinal');
        const prizes = ["500", "10%", "$1000", "15%", "500", "10%", "$2000", "20%"];
        let rot = 0;

        // Versión de seguridad para bloquear un giro por navegador
        const VERSION_ACTUAL = "PROMO_V10_FINAL"; 

        if (localStorage.getItem(VERSION_ACTUAL)) {
            btn.disabled = true;
            btn.innerText = "USADO";
        }

        btn.onclick = async function() {
            if (localStorage.getItem(VERSION_ACTUAL)) return;
            
            // 1. ARRANCAR GIRO INMEDIATAMENTE
            btn.disabled = true;
            const winner = prizes[Math.floor(Math.random() * prizes.length)];
            const index = prizes.indexOf(winner);
            
            rot += (360 * 10) + (360 - (45 * index));
            document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
            
            // 2. BLOQUEAR PARA ESTE NAVEGADOR
            localStorage.setItem(VERSION_ACTUAL, 'true');

            // 3. PROCESAR FIREBASE MIENTRAS GIRA
            setTimeout(async () => {
                let finalID = "0000";
                try {
                    const counterRef = db.collection('config').doc('counter');
                    finalID = await db.runTransaction(async (t) => {
                        const d = await t.get(counterRef);
                        const nv = (d.exists ? d.data().value : 0) + 1;
                        t.set(counterRef, { value: nv });
                        return nv;
                    });
                    
                    // Guardar registro del ganador
                    await db.collection("jugadores").add({
                        premio: winner,
                        idCupon: finalID,
                        fecha: new Date().toISOString()
                    });
                } catch(e) { 
                    console.error("Firebase Error:", e);
                    finalID = Math.floor(Math.random() * 999); 
                }

                // Mostrar Cupón
                document.getElementById('p-valor').innerText = winner;
                document.getElementById('p-id').innerText = finalID.toString().padStart(4, '0');
                document.getElementById('p-fecha').innerText = new Date().toLocaleString();
                document.getElementById('ticket').style.display = "block";
            }, 6200);
        };
    </script>
</body>
</html>
