<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta VIP</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

:root { --gold: #d4af37; }

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000 url('fondo.jpg') center/cover no-repeat;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
}

/* RULETA CONTENEDOR RESPONSIVE */
.ruleta-externa {
    position: relative;
    width: min(90vw, 500px);
    height: min(90vw, 500px);
    border-radius: 50%;
    padding: 3%;
    background: radial-gradient(circle at 30% 30%, #f6d365, #d4af37, #8c6b1f);
    box-shadow:
        0 0 40px rgba(212,175,55,0.6),
        inset 0 0 40px rgba(0,0,0,0.8);
}

/* BORDE GLOW */
.ruleta-externa::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    box-shadow:
        0 0 0 6px #d4af37,
        0 0 25px rgba(212,175,55,0.8);
}

/* RULETA */
#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, #111, #000);
    transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
}

/* TEXTO */
.texto-premio {
    fill: #fff;
    font-weight: 900;
    text-anchor: middle;
    dominant-baseline: middle;
    font-size: 3.2px;
}

@media (min-width: 600px) {
    .texto-premio {
        font-size: 5px;
    }
}

/* BOTÓN RESPONSIVE */
.btn-giro {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22%;
    height: 22%;
    border-radius: 50%;
    background: #000;
    border: 4px solid var(--gold);
    color: var(--gold);
    font-weight: 900;
    cursor: pointer;
    font-size: clamp(12px, 3vw, 16px);
    box-shadow:
        0 0 20px rgba(212,175,55,0.7),
        inset 0 0 15px rgba(212,175,55,0.3);
}

/* PUNTERO RESPONSIVE */
.puntero {
    position: absolute;
    top: -8%;
    left: 50%;
    transform: translateX(-50%);
    width: 12%;
}

</style>
</head>

<body>

<div class="ruleta-externa">

    <!-- PUNTERO -->
    <svg class="puntero" viewBox="0 0 100 120">
        <path d="M50 120 L90 40 L50 0 L100 40 Z" fill="#b00"/>
        <path d="M50 120 L10 40 L50 0 L0 40 Z" fill="#f00"/>
    </svg>

    <!-- RULETA -->
    <div id="wheel">
        <svg viewBox="0 0 100 100">

            <g stroke="#d4af37" stroke-width="1">
                <path d="M50 50 L50 0 A50 50 0 0 1 85.3 14.7 Z" fill="#000"/>
                <path d="M50 50 L85.3 14.7 A50 50 0 0 1 100 50 Z" fill="#000"/>
                <path d="M50 50 L100 50 A50 50 0 0 1 85.3 85.3 Z" fill="#000"/>
                <path d="M50 50 L85.3 85.3 A50 50 0 0 1 50 100 Z" fill="#000"/>
                <path d="M50 50 L50 100 A50 50 0 0 1 14.7 85.3 Z" fill="#000"/>
                <path d="M50 50 L14.7 85.3 A50 50 0 0 1 0 50 Z" fill="#000"/>
                <path d="M50 50 L0 50 A50 50 0 0 1 14.7 14.7 Z" fill="#000"/>
                <path d="M50 50 L14.7 14.7 A50 50 0 0 1 50 0 Z" fill="#000"/>
            </g>

            <!-- TEXTOS -->
            <text x="50" y="15" class="texto-premio" transform="rotate(22.5 50 50) rotate(90 50 15)">10%</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(67.5 50 50) rotate(90 50 15)">$1000</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(112.5 50 50) rotate(90 50 15)">15%</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(157.5 50 50) rotate(90 50 15)">$500</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(202.5 50 50) rotate(90 50 15)">20%</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(247.5 50 50) rotate(90 50 15)">$2000</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(292.5 50 50) rotate(90 50 15)">10%</text>
            <text x="50" y="15" class="texto-premio" transform="rotate(337.5 50 50) rotate(90 50 15)">$500</text>

        </svg>
    </div>

    <!-- BOTÓN -->
    <button class="btn-giro" onclick="girar()">GIRAR</button>

</div>

<script>

const premios = ["10%", "$1000", "15%", "$500", "20%", "$2000", "10%", "$500"];
let rotacion = 0;

function girar() {
    const index = Math.floor(Math.random() * premios.length);

    rotacion += 3600 - (index * 45) - 22.5;
    document.getElementById("wheel").style.transform = `rotate(${rotacion}deg)`;

    setTimeout(() => {
        alert("Ganaste: " + premios[index]);
    }, 3000);
}

</script>

</body>
</html>
