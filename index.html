<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Rey VIP</title>
    
    <!-- TUS SCRIPTS MANTENIDOS - NO EDITAR -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://googleapis.com');
        :root { --gold: #d4af37; --violeta: #8a2be2; --naranja: #ff8c00; --amarillo: #ffd700; --azul: #1e90ff; }
        
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #111 url('fondo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .escena { position: relative; width: 100%; max-width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* PERSONAJE */
        .personaje { position: absolute; bottom: 0; left: -60px; width: 450px; z-index: 100; pointer-events: none; filter: drop-shadow(15px 10px 25px rgba(0,0,0,0.9)); }
        
        /* LOGO: Grande y Arriba */
        .logo-leon { position: absolute; bottom: 150px; right: 20px; width: 110px; height: 110px; z-index: 101; border: 4px solid var(--gold); border-radius: 50%; background: black; object-fit: contain; }

        /* RULETA */
        .ruleta-externa { position: relative; width: min(92vw, 550px); height: min(92vw, 550px); background: radial-gradient(circle, #f9f295 0%, #d4af37 50%, #b38b2d 100%); border-radius: 50%; padding: 10px; box-shadow: 0 30px 70px rgba(0,0,0,0.9); z-index: 10; margin-top: -180px; }
        #wheel { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; }
        .puntero { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 60px; z-index: 1000; pointer-events: none; }
        .btn-giro { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: #000; border: 5px solid var(--gold); border-radius: 50%; color: gold; font-size: 16px; font-weight: 900; cursor: pointer; z-index: 9999 !important; box-shadow: 0 0 30px gold; }
        .btn-giro:disabled { opacity: 0.5; filter: grayscale(1); }

        .texto-premio { fill: white; font-size: 5.2px; font-weight: 900; text-anchor: middle; paint-order: stroke; stroke: #000; stroke-width: 1.2px; }

        /* TICKET: Con Monedas y Estrellas */
        .ticket { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; 
            background: white url('https://transparenttextures.com');
            background-color: #fff; color: #111; padding: 25px; border-radius: 20px; text-align: center; 
            border: 8px solid var(--gold); box-shadow: 0 0 0 2000px rgba(0,0,0,0.8), 0 30px 100px rgba(0,0,0,1); 
            display: none; z-index: 99999; 
        }
        .ticket h3 { margin: 0; color: #d4af37; font-size: 22px; }
        .ticket h2 { margin: 10px 0; font-size: 55px; }

        @media (max-width: 480px) {
            .personaje { width: 320px; left: -40px; }
            .ruleta-externa { margin-top: -240px; }
            .logo-leon { bottom: 130px; width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="escena">
        <img src="chico.png" class="personaje">
        <img src="leon.png" class="logo-leon">
        <div class="ruleta-externa">
            <svg class="puntero" viewBox="0 0 100 100"><path d="M50 100 L100 0 L0 0 Z" fill="#fff" /></svg>
            <div id="wheel">
                <svg viewBox="0 0 100 100">
                    <path d="M50 50 L50 0 A50 50 0 0 1 85.3 14.7 Z" fill="var(--naranja)" />
                    <path d="M50 50 L85.3 14.7 A50 50 0 0 1 100 50 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L100 50 A50 50 0 0 1 85.3 85.3 Z" fill="var(--azul)" />
                    <path d="M50 50 L85.3 85.3 A50 50 0 0 1 50 100 Z" fill="var(--violeta)" />
                    <path d="M50 50 L50 100 A50 50 0 0 1 14.7 85.3 Z" fill="var(--naranja)" />
                    <path d="M50 50 L14.7 85.3 A50 50 0 0 1 0 50 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L0 50 A50 50 0 0 1 14.7 14.7 Z" fill="var(--azul)" />
                    <path d="M50 50 L14.7 14.7 A50 50 0 0 1 50 0 Z" fill="var(--violeta)" />
                    
                    <text x="68" y="18" class="texto-premio" transform="rotate(22.5, 68, 18)">10%</text>
                    <text x="88" y="38" class="texto-premio" transform="rotate(67.5, 88, 38)">$1000</text>
                    <text x="88" y="65" class="texto-premio" transform="rotate(112.5, 88, 65)">15%</text>
                    <text x="68" y="86" class="texto-premio" transform="rotate(157.5, 68, 86)">$500</text>
                    <text x="35" y="86" class="texto-premio" transform="rotate(202.5, 35, 86)">20%</text>
                    <text x="13" y="65" class="texto-premio" transform="rotate(247.5, 13, 65)">$2000</text>
                    <text x="13" y="38" class="texto-premio" transform="rotate(292.5, 13, 38)">10%</text>
                    <text x="35" y="18" class="texto-premio" transform="rotate(337.5, 35, 18)">$500</text>
                </svg>
            </div>
            <button class="btn-giro" id="btnFinal" onclick="girarRuleta()">GIRAR</button>
        </div>
        
        <div id="ticket" class="ticket">
            <h3>⭐ 💰 ¡GANASTE! 💰 ⭐</h3>
            <h2 id="p-valor">---</h2>
            <p>CUPÓN: #<span id="p-id">0000</span></p>
            <small id="p-fecha"></small>
            <br>
            <button onclick="enviarWhatsApp()" style="margin-top:20px; padding:15px 30px; background:#25d366; border:none; border-radius:15px; font-weight:900; color:#fff; cursor:pointer; font-size:18px;">COBRAR POR WHATSAPP</button>
        </div>
    </div>

    <script>
        // TUS CREDENCIALES MANTENIDAS - NO EDITAR
        const firebaseConfig = {
            apiKey: "AIzaSyBlaMettjLKQsDAJR2yXBVPUgySE45vMJU",
            authDomain: "ruleta-rey-v2.firebaseapp.com",
            projectId: "ruleta-rey-v2",
            storageBucket: "ruleta-rey-v2.firebasestorage.app",
            messagingSenderId: "470808925766",
            appId: "1:925607172632:web:7f4b59dc96637c3aed416d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const prizes = ["10%", "$1000", "15%", "$500", "20%", "$2000", "10%", "$500"];
        let currentRotation = 0;

        const VERSION = "VERSION 22/4/2026/02"; 
        if (localStorage.getItem(VERSION)) {
            document.getElementById('btnFinal').disabled = true;
            document.getElementById('btnFinal').innerText = "USADO";
        }

        function girarRuleta() {
            if (localStorage.getItem(VERSION)) return;
            document.getElementById('btnFinal').disabled = true;

            const winnerIndex = Math.floor(Math.random() * prizes.length);
            const winnerValue = prizes[winnerIndex];
            currentRotation += (10 * 360) - (winnerIndex * 45) - 22.5;
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
            localStorage.setItem(VERSION, 'true');

            setTimeout(async () => {
                let finalID = 0;
                try {
                    const counterRef = db.collection('config').doc('counter');
                    finalID = await db.runTransaction(async (t) => {
                        const d = await t.get(counterRef);
                        const nv = (d.exists ? d.data().value : 0) + 1;
                        t.set(counterRef, { value: nv });
                        return nv;
                    });
                    await db.collection("jugadores").add({ premio: winnerValue, idCupon: finalID, fecha: new Date().toISOString() });
                } catch(e) { finalID = Math.floor(Math.random() * 500); }

                document.getElementById('p-valor').innerText = winnerValue;
                document.getElementById('p-id').innerText = finalID.toString().padStart(4, '0');
                document.getElementById('p-fecha').innerText = new Date().toLocaleString();
                document.getElementById('ticket').style.display = "block";
            }, 6200);
        }

function enviarWhatsApp() {
    var numero = "5491124050658"; 
    
    var valorPremio = document.getElementById('p-valor').innerText;
    var idCupon = document.getElementById('p-id').innerText;
    
    var texto = `¡Hola! Gané en la Ruleta VIP 🎰

🏆 Premio: ${valorPremio}
🎫 Cupón: #${idCupon}

Quiero cobrarlo.`;

    var urlFinal = "https://wa.me/" + numero + "?text=" + encodeURIComponent(texto);
    
    window.open(urlFinal, '_blank');
}    
    </script>
</body>
</html>
