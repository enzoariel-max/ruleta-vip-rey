<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Rey VIP - Mobile Ready</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        @import url('https://googleapis.com');
        :root { --gold: #d4af37; --violeta: #8a2be2; --naranja: #ff8c00; --amarillo: #ffd700; --azul: #1e90ff; }
        
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #111 url('fondo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        /* Contenedor Adaptable */
        .escena { position: relative; width: 100%; max-width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* PERSONAJE: Se ajusta en el móvil */
        .personaje { position: absolute; bottom: 0; left: -30px; width: 350px; z-index: 100; pointer-events: none; filter: drop-shadow(15px 10px 20px rgba(0,0,0,0.9)); transition: all 0.3s; }
        
        .logo-leon { position: absolute; bottom: 15px; right: 15px; width: 70px; height: 70px; z-index: 101; border: 2px solid var(--gold); border-radius: 50%; background: black; pointer-events: none; }

        /* RULETA RESPONSIVE: Usa 'vw' para adaptarse al ancho de pantalla */
        .ruleta-externa { 
            position: relative; 
            width: min(90vw, 520px); 
            height: min(90vw, 520px); 
            background: radial-gradient(circle, #f9f295 0%, #d4af37 50%, #b38b2d 100%); 
            border-radius: 50%; padding: 8px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            z-index: 10; margin-top: -40px; 
        }
        
        #wheel { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; }
        
        .puntero { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 50px; z-index: 1000; pointer-events: none; }
        
        .btn-giro { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85px; height: 85px; background: #000; border: 4px solid var(--gold); border-radius: 50%; color: gold; font-size: 14px; font-weight: 900; cursor: pointer; z-index: 9999 !important; box-shadow: 0 0 25px gold; }
        .btn-giro:disabled { opacity: 0.5; filter: grayscale(1); }

        .texto-premio { fill: white; font-size: 5.5px; font-weight: 900; text-anchor: middle; paint-order: stroke; stroke: #000; stroke-width: 1.2px; }

        /* TICKET ADAPTABLE */
        .ticket { position: absolute; bottom: 30px; width: 90%; max-width: 350px; background: white url('https://transparenttextures.com'); color: #111; padding: 20px; border-radius: 20px; text-align: center; border: 4px solid var(--gold); box-shadow: 0 30px 60px rgba(0,0,0,0.9); display: none; z-index: 8000; }
        .ticket h2 { margin: 0; font-size: 40px; color: var(--naranja); }
        .ticket p { margin: 8px 0; font-size: 18px; font-weight: bold; }

        /* AJUSTES ESPECÍFICOS PARA CELULARES PEQUEÑOS */
        @media (max-width: 480px) {
            .personaje { width: 220px; left: -20px; opacity: 0.8; } /* Achicamos al chico para que no tape todo */
            .btn-giro { width: 75px; height: 75px; font-size: 12px; }
            .ruleta-externa { margin-top: -20px; }
            .logo-leon { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="escena">
        <img src="chico.png" class="personaje">
        <img src="leon.png" class="logo-leon">
        <div class="ruleta-externa">
            <svg class="puntero" viewBox="0 0 100 100"><path d="M50 100 L100 0 L0 0 Z" fill="#fff" /></svg>
            <div id="wheel">
                <svg viewBox="0 0 100 100">
                    <path d="M50 50 L100 50 A50 50 0 0 1 85.3 85.3 Z" fill="var(--violeta)" />
                    <path d="M50 50 L85.3 85.3 A50 50 0 0 1 50 100 Z" fill="var(--naranja)" />
                    <path d="M50 50 L50 100 A50 50 0 0 1 14.7 85.3 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L14.7 85.3 A50 50 0 0 1 0 50 Z" fill="var(--azul)" />
                    <path d="M50 50 L0 50 A50 50 0 0 1 14.7 14.7 Z" fill="var(--violeta)" />
                    <path d="M50 50 L14.7 14.7 A50 50 0 0 1 50 0 Z" fill="var(--naranja)" />
                    <path d="M50 50 L50 0 A50 50 0 0 1 85.3 14.7 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L85.3 14.7 A50 50 0 0 1 100 50 Z" fill="var(--azul)" />
                    
                    <text x="77" y="68" class="texto-premio" transform="rotate(22.5, 77, 68)">$500</text>
                    <text x="58" y="81" class="texto-premio" transform="rotate(67.5, 58, 81)">10%</text>
                    <text x="31" y="81" class="texto-premio" transform="rotate(112.5, 31, 81)">$1000</text>
                    <text x="14" y="68" class="texto-premio" transform="rotate(157.5, 14, 68)">15%</text>
                    <text x="23" y="32" class="texto-premio" transform="rotate(202.5, 23, 32)">$500</text>
                    <text x="42" y="19" class="texto-premio" transform="rotate(247.5, 42, 19)">10%</text>
                    <text x="69" y="19" class="texto-premio" transform="rotate(292.5, 69, 19)">$2000</text>
                    <text x="86" y="32" class="texto-premio" transform="rotate(337.5, 86, 32)">20%</text>
                </svg>
            </div>
            <button class="btn-giro" id="btnFinal" onclick="girarRuleta()">GIRAR</button>
        </div>
        <div id="ticket" class="ticket">
            <h2 id="p-valor">---</h2>
            <p>ID DE CUPÓN: #<span id="p-id">0000</span></p>
            <small id="p-fecha"></small>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3CWqVqfX3fW7EOk_uqwZCkbowHZSdRFs",
            authDomain: "://firebaseapp.com",
            projectId: "ruleta-rey-v2",
            storageBucket: "ruleta-rey-v2.firebasestorage.app",
            messagingSenderId: "925607172632",
            appId: "1:925607172632:web:7f4b59dc96637c3aed416d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const btn = document.getElementById('btnFinal');
        const wheel = document.getElementById('wheel');
        // Lista sincronizada con la flecha arriba (sentido antihorario interno)
        const prizes = ["20%", "$2000", "10%", "$500", "15%", "$1000", "10%", "$500"];
        let rot = 0;

        // CAMBIA ESTO PARA RESETEAR A TODOS LOS CLIENTES
        const VERSION = "VERSION_FINAL_MOBILE_V1"; 

        if (localStorage.getItem(VERSION)) {
            btn.disabled = true;
            btn.innerText = "USADO";
        }

        function girarRuleta() {
            if (localStorage.getItem(VERSION)) return;
            btn.disabled = true;
            
            const winnerIndex = Math.floor(Math.random() * prizes.length);
            const winner = prizes[winnerIndex];
            
            rot += (360 * 10) + (winnerIndex * 45);
            wheel.style.transform = "rotate(" + rot + "deg)";
            localStorage.setItem(VERSION, 'true');

            setTimeout(async () => {
                let finalID = 0;
                try {
                    const counterRef = db.collection('config').doc('counter');
                    finalID = await db.runTransaction(async (t) => {
                        const d = await t.get(counterRef);
                        const nv = (d.exists ? d.data().value : 0) + 1;
                        t.set(counterRef, { value: nv });
                        return nv;
                    });
                    await db.collection("jugadores").add({ premio: winner, idCupon: finalID, fecha: new Date().toISOString() });
                } catch(e) { finalID = Math.floor(Math.random() * 500); }

                document.getElementById('p-valor').innerText = winner;
                document.getElementById('p-id').innerText = finalID.toString().padStart(4, '0');
                document.getElementById('p-fecha').innerText = new Date().toLocaleString();
                document.getElementById('ticket').style.display = "block";
            }, 6200);
        }
    </script>
</body>
</html>
