        .btn-giro:disabled { opacity: 0.5; filter: grayscale(1); }

        /* TEXTO BLANCO VERTICAL */
        .texto-premio { fill: #ffffff !important; font-size: 6px; font-weight: 900; text-anchor: middle; dominant-baseline: middle; filter: drop-shadow(1px 1px 2px rgba(0,0,0,1)); }

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const prizes = ["10%", "$1000", "15%", "$500", "20%", "$2000", "10%", "$500"];
        let currentRotation = 0;
        let premioFinal = "";
        let cuponFinal = "";

        const VERSION = "VERSION 22/4/2026/02"; 
        if (localStorage.getItem(VERSION)) {
            document.getElementById('btnFinal').disabled = true;
            document.getElementById('btnFinal').innerText = "USADO";
        }

        function girarRuleta() {
            if (localStorage.getItem(VERSION)) return;
            document.getElementById('btnFinal').disabled = true;

            const bolsa = [0,0,0,1,1,1,2,2,2,3,3,3,4,5,6,6,6,7,7,7];
            const randomIndex = Math.floor(Math.random() * bolsa.length);
            const winnerIndex = bolsa[randomIndex];
            premioFinal = prizes[winnerIndex];

            currentRotation += (10 * 360) - (winnerIndex * 45) - 22.5;
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
            localStorage.setItem(VERSION, 'true');

            setTimeout(async () => {
                let tempID = Math.floor(Math.random() * 1000);
                document.getElementById('p-valor').innerText = premioFinal;
                document.getElementById('p-id').innerText = tempID;
                document.getElementById('p-fecha').innerText = new Date().toLocaleString();
                document.getElementById('ticket').style.display = 'block';

                try {
                    const counterRef = db.collection('config').doc('counter');
                    const finalID = await db.runTransaction(async (t) => {
                        const d = await t.get(counterRef);
                        const nv = (d.exists ? d.data().value : 0) + 1;
                        t.set(counterRef, { value: nv });
                        return nv;
                    });
                    cuponFinal = finalID;
                    document.getElementById('p-id').innerText = finalID;
                    await db.collection("jugadores").add({ premio: premioFinal, idCupon: finalID, fecha: new Date().toISOString() });
                } catch(e) { cuponFinal = tempID; }
            }, 3000); 
        }

        }
