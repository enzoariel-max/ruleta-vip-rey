<style>
    @import url('https://googleapis.com');

    :root { --gold: #d4af37; }

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000 url('fondo.jpg') no-repeat center center fixed;
        background-size: cover;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
    }

    .escena {
        position: relative;
        width: 100%;
        max-width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .personaje {
        position: absolute;
        bottom: 0;
        left: -60px;
        width: 450px;
        z-index: 100;
        pointer-events: none;
        filter: drop-shadow(15px 10px 25px rgba(0,0,0,0.9));
    }

    .logo-leon {
        position: absolute;
        bottom: 150px;
        right: 20px;
        width: 180px;
        height: 180px;
        z-index: 101;
        border: 5px solid var(--gold);
        border-radius: 50%;
        background: black;
        object-fit: contain;
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
    }

    /* ===== RULETA PRO ===== */
    .ruleta-externa {
        position: relative;
        width: min(92vw, 550px);
        height: min(92vw, 550px);
        border-radius: 50%;
        padding: 12px;

        background: radial-gradient(circle at 30% 30%, #ffd700, #b8962e);

        box-shadow:
            0 30px 70px rgba(0,0,0,1),
            inset 0 0 25px rgba(255,255,255,0.2),
            0 0 30px rgba(255,215,0,0.5);

        z-index: 10;
        margin-top: -180px;
    }

    /* LUCES GIRANDO */
    .ruleta-externa::before {
        content: "";
        position: absolute;
        inset: -14px;
        border-radius: 50%;

        background: repeating-conic-gradient(
            #ffd700 0deg 4deg,
            #000 4deg 12deg
        );

        filter: blur(2px);
        animation: girarLuces 6s linear infinite;
        z-index: 0;
    }

    @keyframes girarLuces {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* BRILLO SUPERIOR */
    .ruleta-externa::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%);
        pointer-events: none;
    }

    /* RULETA INTERNA */
    #wheel {
        width: 100%;
        height: 100%;
        border-radius: 50%;

        background: radial-gradient(circle at center, #111 0%, #000 70%);

        box-shadow:
            inset 0 0 30px rgba(255,255,255,0.08),
            inset 0 0 60px rgba(0,0,0,0.9);

        transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
    }

    .puntero {
        position: absolute;
        top: -45px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        z-index: 1000;
        pointer-events: none;
        filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
    }

    /* BOTÓN PRO */
    .btn-giro {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;

        background: radial-gradient(circle, #111, #000);
        border: 4px solid var(--gold);
        border-radius: 50%;

        color: var(--gold);
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;

        box-shadow:
            0 0 20px rgba(255,215,0,0.6),
            inset 0 0 15px rgba(255,215,0,0.2);

        z-index: 9999 !important;
    }

    .btn-giro:disabled {
        opacity: 0.5;
        filter: grayscale(1);
    }

    .texto-premio {
        fill: #ffffff !important;
        font-size: 6px;
        font-weight: 900;
        text-anchor: middle;
        dominant-baseline: middle;
        filter: drop-shadow(1px 1px 2px rgba(0,0,0,1));
    }

    .ticket {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 380px;
        background-color: #fff;
        color: #111;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        border: 8px solid var(--gold);
        box-shadow: 0 0 0 2000px rgba(0,0,0,0.85), 0 30px 100px rgba(0,0,0,1);
        display: none;
        z-index: 99999;
    }

    .ticket h3 { margin: 0; color: var(--gold); font-size: 22px; }
    .ticket h2 { margin: 10px 0; font-size: 55px; }

    @media (max-width: 480px) {
        .personaje { width: 320px; left: -40px; }
        .ruleta-externa { margin-top: -240px; }
        .logo-leon { bottom: 130px; width: 130px; height: 130px; }
    }
</style>
