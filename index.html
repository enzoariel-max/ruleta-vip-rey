<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Rey VIP</title>
    <!-- Librerías de Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        @import url('https://googleapis.com');
        :root { --gold: #d4af37; --violeta: #8a2be2; --naranja: #ff8c00; --amarillo: #ffd700; --azul: #1e90ff; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: url('fondo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .escena { position: relative; width: 100%; max-width: 600px; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .personaje { position: absolute; bottom: 0; left: -100px; width: 350px; z-index: 100; pointer-events: none; filter: drop-shadow(20px 10px 30px rgba(0,0,0,0.9)); }
        .logo-leon { position: absolute; bottom: 30px; right: 30px; width: 90px; height: 90px; z-index: 101; border: 3px solid var(--gold); border-radius: 50%; background: black; object-fit: contain; }
        .ruleta-externa { position: relative; width: 480px; height: 480px; background: radial-gradient(circle, #f9f295 0%, #d4af37 50%, #b38b2d 100%); border-radius: 50%; padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); z-index: 10; }
        #wheel { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); border-radius: 50%; }
        .puntero { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 60px; z-index: 1000; pointer-events: none; }
        /* EL BOTÓN AHORA ESTÁ POR ENCIMA DE TODO */
        .btn-giro { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: #000; border: 4px solid var(--gold); border-radius: 50%; color: gold; font-size: 18px; font-weight: 900; cursor: pointer; z-index: 2000 !important; box-shadow: 0 0 30px gold; }
        .texto-premio { fill: white; font-size: 5.2px; font-weight: 900; text-anchor: middle; paint-order: stroke; stroke: #000; stroke-width: 1px; }
        .ticket { position: absolute; bottom: 80px; width: 300px; background: #fff; color: #111; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 10px solid var(--gold); box-shadow: 0 40px 80px rgba(0,0,0,0.9); display: none; z-index: 3000; }
    </style>
</head>
<body>
    <div class="escena">
        <img src="chico.png" class="personaje">
        <img src="leon.png" class="logo-leon">
        <div class="ruleta-externa">
            <svg class="puntero" viewBox="0 0 100 100"><path d="M50 100 L100 0 L0 0 Z" fill="#fff" /></svg>
            <div id="wheel">
                <svg viewBox="0 0 100 100">
                    <path d="M50 50 L100 50 A50 50 0 0 1 85.3 85.3 Z" fill="var(--violeta)" />
                    <path d="M50 50 L85.3 85.3 A50 50 0 0 1 50 100 Z" fill="var(--naranja)" />
                    <path d="M50 50 L50 100 A50 50 0 0 1 14.7 85.3 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L14.7 85.3 A50 50 0 0 1 0 50 Z" fill="var(--azul)" />
                    <path d="M50 50 L0 50 A50 50 0 0 1 14.7 14.7 Z" fill="var(--violeta)" />
                    <path d="M50 50 L14.7 14.7 A50 50 0 0 1 50 0 Z" fill="var(--naranja)" />
                    <path d="M50 50 L50 0 A50 50 0 0 1 85.3 14.7 Z" fill="var(--amarillo)" />
                    <path d="M50 50 L85.3 14.7 A50 50 0 0 1 100 50 Z" fill="var(--azul)" />
                    <text x="78" y="70" class="texto-premio" transform="rotate(22.5, 78, 70)">500</text>
                    <text x="58" y="85" class="texto-premio" transform="rotate(67.5, 58, 85)">10%</text>
                    <text x="30" y="85" class="texto-premio" transform="rotate(112.5, 30, 85)">$1000</text>
                    <text x="12" y="70" class="texto-premio" transform="rotate(157.5, 12, 70)">15%</text>
                    <text x="22" y="30" class="texto-premio" transform="rotate(202.5, 22, 30)">500</text>
                    <text x="42" y="15" class="texto-premio" transform="rotate(247.5, 42, 15)">10%</text>
                    <text x="70" y="15" class="texto-premio" transform="rotate(292.5, 70, 15)">$2000</text>
                    <text x="88" y="30" class="texto-premio" transform="rotate(337.5, 88, 30)">20%</text>
                </svg>
            </div>
            <button class="btn-giro" id="btnFinal">GIRAR</button>
        </div>
        <div id="ticket" class="ticket">
            <h1 id="p-valor" style="font-size:45px; margin:0;">---</h1>
            <p>CÓDIGO: #<span id="p-id">0000</span></p>
            <small id="p-fecha"></small>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlaMettjLKQsDAJR2yXBVPUgySE45vMJU",
            authDomain: "://firebaseapp.com",
            projectId: "ruleta-promo-77112",
            storageBucket: "ruleta-promo-77112.firebasestorage.app",
            messagingSenderId: "470808925766",
            appId: "1:470808925766:web:08b4980b9ada3d58175c47"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const prizes = ["500", "10%", "$1000", "15%", "500", "10%", "$2000", "20%"];
        let rot = 0;
        let girando = false;

        document.getElementById('btnFinal').onclick = function() {
            if (girando) return;
            girando = true;
            
            const winner = prizes[Math.floor(Math.random() * prizes.length)];
            const index = prizes.indexOf(winner);
            rot += (360 * 10) + (360 - (45 * index));
            
            document.getElementById('wheel').style.transform = "rotate(" + rot + "deg)";
            
            setTimeout(async () => {
                const code = Math.floor(Math.random() * 9000) + 1000;
                document.getElementById('p-valor').innerText = winner;
                document.getElementById('p-id').innerText = code;
                document.getElementById('p-fecha').innerText = new Date().toLocaleString();
                document.getElementById('ticket').style.display = "block";
                
                try {
                    await db.collection("jugadores").add({
                        premio: winner, id: code, fecha: new Date().toISOString()
                    });
                } catch(e) { console.log("Error al guardar"); }
                girando = false;
            }, 6200);
        };
    </script>
</body>
</html>
